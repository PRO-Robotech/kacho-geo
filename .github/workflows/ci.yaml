name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

# kacho-geo собирается из своего репо; зависимости (kacho-proto, kacho-corelib) —
# versioned-модули с GitHub (go.mod без replace), поэтому siblings checkout не нужен.

defaults:
  run:
    working-directory: kacho-geo

jobs:
  build-vet-test:
    name: build + vet + test (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-geo }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-geo/go.mod, cache-dependency-path: kacho-geo/go.sum }
      - run: go mod download
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -short -count=1 -timeout 5m ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-geo }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-geo/go.mod, cache-dependency-path: kacho-geo/go.sum }
      - uses: golangci/golangci-lint-action@v9
        with:
          working-directory: kacho-geo
          args: --timeout 5m

  govuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { path: kacho-geo }
      - uses: actions/setup-go@v6
        with: { go-version-file: kacho-geo/go.mod, cache-dependency-path: kacho-geo/go.sum }
      - run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...
        continue-on-error: true
